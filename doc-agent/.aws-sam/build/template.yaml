AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "Doc Agent \u2014 Slack-triggered documentation generation from Jira\
  \ tickets"
Parameters:
  JiraApiTokenArn:
    Type: String
    Description: "Secrets Manager ARN \u2014 Jira API token"
  GitHubTokenArn:
    Type: String
    Description: "Secrets Manager ARN \u2014 GitHub token (write, for docs repo PRs)"
  ClaudeApiKeyArn:
    Type: String
    Description: "Secrets Manager ARN \u2014 Anthropic API key"
  SlackSigningSecretArn:
    Type: String
    Description: "Secrets Manager ARN \u2014 Slack app signing secret"
  SlackBotTokenArn:
    Type: String
    Description: "Secrets Manager ARN \u2014 Slack bot token (xoxb-...)"
  JiraUserEmail:
    Type: String
  DocsGitHubRepo:
    Type: String
    Default: wallarm/product-docs-en
Resources:
  SlackReceiver:
    Type: AWS::Serverless::Function
    Metadata:
      DockerContext: /Users/user/Documents/GitHub/product-docs-en/doc-agent
      DockerTag: slack-latest
      Dockerfile: Dockerfile.slack
      SamResourceId: SlackReceiver
    Properties:
      PackageType: Image
      Timeout: 10
      MemorySize: 256
      Environment:
        Variables:
          SLACK_SIGNING_SECRET_ARN:
            Ref: SlackSigningSecretArn
          SLACK_BOT_TOKEN_ARN:
            Ref: SlackBotTokenArn
          WORKER_FUNCTION_NAME:
            Ref: Worker
      Policies:
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action: secretsmanager:GetSecretValue
          Resource:
          - Ref: SlackSigningSecretArn
          - Ref: SlackBotTokenArn
        - Effect: Allow
          Action: lambda:InvokeFunction
          Resource:
            Fn::GetAtt:
            - Worker
            - Arn
      Events:
        SlackEvent:
          Type: Api
          Properties:
            Path: /slack/events
            Method: POST
      ImageUri: slackreceiver:slack-latest
  Worker:
    Type: AWS::Serverless::Function
    Metadata:
      DockerContext: /Users/user/Documents/GitHub/product-docs-en/doc-agent
      DockerTag: latest
      Dockerfile: Dockerfile
      SamResourceId: Worker
    Properties:
      PackageType: Image
      Timeout: 900
      MemorySize: 2048
      Environment:
        Variables:
          JIRA_API_TOKEN_ARN:
            Ref: JiraApiTokenArn
          GITHUB_TOKEN_ARN:
            Ref: GitHubTokenArn
          CLAUDE_API_KEY_ARN:
            Ref: ClaudeApiKeyArn
          SLACK_BOT_TOKEN_ARN:
            Ref: SlackBotTokenArn
          JIRA_USER_EMAIL:
            Ref: JiraUserEmail
          JIRA_BASE_URL: https://wallarm.atlassian.net
          DOCS_GITHUB_REPO:
            Ref: DocsGitHubRepo
      Policies:
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action: secretsmanager:GetSecretValue
          Resource:
          - Ref: JiraApiTokenArn
          - Ref: GitHubTokenArn
          - Ref: ClaudeApiKeyArn
          - Ref: SlackBotTokenArn
      ImageUri: worker:latest
Outputs:
  SlackEventUrl:
    Description: Paste this URL into Slack app Event Subscriptions
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/slack/events
  WorkerFunctionName:
    Description: "For manual invoke \u2014 aws lambda invoke --function-name <name>\
      \ --payload '{\"issue_key\":\"PROD-3059\"}' out.json"
    Value:
      Ref: Worker
