[build]
publish = "site"
edge_functions = "netlify/edge-functions"
# Image optimisation, two passes, before any per-version build copies the
# directory. Both run on the ephemeral CI checkout — full-resolution originals
# stay in git.
#
# 1. Downscale (scripts/optimize_images.py, Pillow): screenshots are captured on
#    retina displays at 2500-8000px wide, but the docs column is under ~900px, so
#    anything above ~1800px is never seen at native resolution — readers just pay
#    the bytes. Resizes only true-colour (RGB/RGBA) PNGs WIDER than 1800px
#    (Lanczos); leaves smaller ones and the already-compact palette/grayscale
#    PNGs untouched (promoting those to true-colour for the resample would bloat
#    them). 1800px keeps a >=2x budget for retina, so no visible loss. This is
#    the real bandwidth lever: oversized true-colour PNGs are the top consumers
#    in analytics.
# 2. oxipng: download the release binary from GitHub (single ~500 KB file, no
#    transitive deps and so no audit issues — the npm `oxipng-bin` wrapper drags
#    in 150+ packages, several with known ReDoS vulnerabilities and no upstream
#    fix), then losslessly recompress every PNG. --strip safe keeps colour
#    profile and gamma metadata. -o 2 is the recommended speed/size tradeoff for
#    batch use. Runs AFTER the resize so it squeezes the already-smaller files.
#
# Both passes only run on production deploys ($CONTEXT == "production"). PR
# previews and branch deploys skip image optimisation to keep iteration fast and
# save build minutes — readers don't see those, so the extra weight doesn't matter.
command = """
pip3 install --no-cache-dir -r requirements.txt &&
# TEMP(revert-before-merge): un-gated so image optimisation runs on the preview
# build to verify the resize pass end-to-end. Restore `[ "$CONTEXT" = "production" ]`.
if true; then \
  echo "Image size before optimisation: $(du -sh images/ | cut -f1) ($(find images/ -name '*.png' | wc -l) PNGs)" && \
  python3 scripts/optimize_images.py images/ --max-width 1800 && \
  curl -fsSL https://github.com/oxipng/oxipng/releases/download/v10.1.1/oxipng-10.1.1-x86_64-unknown-linux-gnu.tar.gz | tar xz --strip-components=1 oxipng-10.1.1-x86_64-unknown-linux-gnu/oxipng && \
  ./oxipng -r -o 2 --strip safe -q images/ && \
  echo "Image size after  optimisation: $(du -sh images/ | cut -f1)"; \
else \
  echo "Skipping image optimisation (CONTEXT=$CONTEXT — only runs on production deploys)"; \
fi &&
# Raw .md companion files (scripts/generate_raw_markdown.py) only ship on
# production. The companions power the "Copy as Markdown" button — readers
# only ever fetch them from docs.wallarm.com, so PR previews and branch
# deploys skip the step to save build minutes. On previews the button will
# fall back to its "Failed to copy" snackbar, which is the expected dev UX.
cp -R images/ docs/6.x/images/ && zensical build -f mkdocs-6.x.yml && if [ "$CONTEXT" = "production" ]; then python3 scripts/generate_raw_markdown.py mkdocs-6.x.yml && python3 scripts/generate_og_images.py mkdocs-6.x.yml; fi && rm -rf docs/6.x/images/ &&
cp -R images/ docs/7.x/images/ && zensical build -f mkdocs-7.x.yml && if [ "$CONTEXT" = "production" ]; then python3 scripts/generate_raw_markdown.py mkdocs-7.x.yml && python3 scripts/generate_og_images.py mkdocs-7.x.yml; fi && rm -rf docs/7.x/images/ &&
cp -R images/ docs/5.0/images/ && zensical build -f mkdocs-5.0.yml && if [ "$CONTEXT" = "production" ]; then python3 scripts/generate_raw_markdown.py mkdocs-5.0.yml && python3 scripts/generate_og_images.py mkdocs-5.0.yml; fi && rm -rf docs/5.0/images/ &&
cp -R images/ docs/deprecated/images/ && zensical build -f mkdocs-deprecated.yml && if [ "$CONTEXT" = "production" ]; then python3 scripts/generate_og_images.py mkdocs-deprecated.yml; fi && rm -rf docs/deprecated/images/ &&
# Aggregated changelog feeds (Atom + RSS + JSON), one per node artifact. Reads the
# changelog files from docs/, self-validates, and aborts the deploy on a broken
# changelog. Production only — PR deploy-previews and branch deploys skip it.
# See scripts/README-feeds.md.
if [ "$CONTEXT" = "production" ]; then python3 scripts/generate_feeds.py --output site; fi
"""
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors *"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"
    # NOTE: the RFC 8288 `Link: </llms.txt>; rel="service-doc"` is added in
    # the edge function (netlify/edge-functions/markdown-negotiation.ts) for
    # HTML and negotiated-markdown responses only — keeps asset responses
    # (.png, .css, fonts, …) free of useless Link headers on every request.

# Serve raw .md / llms*.txt companion files as plain UTF-8 text. CORS is open
# so AI tools, edge functions, and browser-side fetchers can read them
# cross-origin (Cloudflare/Anthropic/Stripe do the same on their .md docs);
# X-Robots-Tag tells Google/Bing not to index these as duplicates of the HTML
# pages (the markdown has no <head>, so robots meta can't live in the file
# itself); 1-hour Cache-Control prevents CDN/browser thrash.
[[headers]]
  for = "/**/*.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Robots-Tag = "noindex, follow"

[[headers]]
  for = "/*.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Robots-Tag = "noindex, follow"

[[headers]]
  for = "/llms*.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Robots-Tag = "noindex, follow"

[[headers]]
  for = "/**/llms*.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Robots-Tag = "noindex, follow"

# Aggregated changelog feeds (scripts/generate_feeds.py). Atom served as
# application/atom+xml so RSS readers and Slack's /feed app recognise it; JSON
# served as application/json. CORS is open so scripts, CI, and browser-side
# agents can fetch the JSON cross-origin (same policy as the .md companions).
# 1-hour Cache-Control; Netlify adds ETag/Last-Modified automatically, so
# If-None-Match / If-Modified-Since conditional polling works.
[[headers]]
  for = "/feeds/*.xml"
  [headers.values]
    Content-Type = "application/atom+xml; charset=utf-8"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/feeds/*.rss"
  [headers.values]
    Content-Type = "application/rss+xml; charset=utf-8"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/feeds/*.json"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Cache-Control = "public, max-age=3600, must-revalidate"

# Screenshots and diagrams. Without an explicit header Netlify serves static
# assets as `max-age=0, must-revalidate`, so every page view / new visitor /
# crawler re-downloads the full file instead of reusing a cached copy — in
# analytics the top bandwidth consumers are all /images/*.png fetched tens of
# thousands of times each. A week-long browser cache stops the bleeding. NOT
# `immutable`: image filenames are not content-hashed, so a replaced screenshot
# reuses its name — max-age bounds how long a stale copy can linger, and Netlify
# purges its own edge cache on every deploy regardless.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Theme bundles and fonts under /assets/ ARE content-hashed by the build
# (e.g. main.f62f0af6.min.css, bundle.d7f30b55.min.js), so a new build ships a
# new filename — the old URL can be cached forever safely.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Serve favicon.png under the conventional /favicon.ico path. Browsers viewing
# raw .md / .txt files have no HTML <head> to read <link rel="icon"> from, so
# they fall back to auto-discovering /favicon.ico — without this rewrite the
# tab would show no favicon for any .md page.
[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.png"
  status = 200

# Redirect sitemap.xml requests from any path to the version root sitemap
[[redirects]]
  from = "/*/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/*/*/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/*/*/*/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
