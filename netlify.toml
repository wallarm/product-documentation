[build]
publish = "site"
edge_functions = "netlify/edge-functions"
command = """
pip3 install --no-cache-dir -r requirements.txt &&
npm install pngquant &&
cp -R images/ docs/6.x/images/ && zensical build -f mkdocs-6.x.yml && python3 scripts/generate_raw_markdown.py mkdocs-6.x.yml && rm -rf docs/6.x/images/ &&
cp -R images/ docs/7.x/images/ && zensical build -f mkdocs-7.x.yml && python3 scripts/generate_raw_markdown.py mkdocs-7.x.yml && rm -rf docs/7.x/images/ &&
cp -R images/ docs/5.0/images/ && zensical build -f mkdocs-5.0.yml && python3 scripts/generate_raw_markdown.py mkdocs-5.0.yml && rm -rf docs/5.0/images/ &&
cp -R images/ docs/deprecated/images/ && zensical build -f mkdocs-deprecated.yml && rm -rf docs/deprecated/images/ &&
cp -R images/ docs/ja/images/ && zensical build -f mkdocs-ja-6.x.yml && rm -rf docs/ja/images/ &&
cp -R images/ docs/tr/images/ && zensical build -f mkdocs-tr-6.x.yml && rm -rf docs/tr/images/ &&
cp -R images/ docs/pt-BR/images/ && zensical build -f mkdocs-pt-BR-4.8.yml && rm -rf docs/pt-BR/images/ &&
cp -R images/ docs/ar/images/ && zensical build -f mkdocs-ar-4.10.yml && rm -rf docs/ar/images/ &&
if [ "$CONTEXT" != "production" ]; then printf 'User-agent: *\nDisallow: /\n' > site/robots.txt; fi
"""
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors *"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"

# Block indexing on non-production deploys (branch deploys like
# llm-sbt-ea.docs.wallarm.com and PR deploy-previews). Production
# (docs.wallarm.com) is unaffected — these blocks are context-scoped.
# Belt-and-suspenders with the build-time robots.txt overwrite above:
# the header covers responses that bots reach directly (.md, images,
# llms*.txt) without consulting robots.txt, and the `noai`/`noimageai`
# tokens signal opt-out to AI crawlers that honor them.
[[context.branch-deploy.headers]]
  for = "/*"
  [context.branch-deploy.headers.values]
    X-Robots-Tag = "noindex, nofollow, noai, noimageai"

[[context.deploy-preview.headers]]
  for = "/*"
  [context.deploy-preview.headers.values]
    X-Robots-Tag = "noindex, nofollow, noai, noimageai"
    # NOTE: the RFC 8288 `Link: </llms.txt>; rel="service-doc"` is added in
    # the edge function (netlify/edge-functions/markdown-negotiation.ts) for
    # HTML and negotiated-markdown responses only — keeps asset responses
    # (.png, .css, fonts, …) free of useless Link headers on every request.

# Serve raw .md / llms*.txt companion files as plain UTF-8 text. CORS is open
# so AI tools, edge functions, and browser-side fetchers can read them
# cross-origin (Cloudflare/Anthropic/Stripe do the same on their .md docs);
# X-Robots-Tag tells Google/Bing not to index these as duplicates of the HTML
# pages (the markdown has no <head>, so robots meta can't live in the file
# itself); 1-hour Cache-Control prevents CDN/browser thrash.
[[headers]]
  for = "/**/*.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Robots-Tag = "noindex, follow"

[[headers]]
  for = "/*.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Robots-Tag = "noindex, follow"

[[headers]]
  for = "/llms*.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Robots-Tag = "noindex, follow"

[[headers]]
  for = "/**/llms*.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Robots-Tag = "noindex, follow"

# Serve favicon.png under the conventional /favicon.ico path. Browsers viewing
# raw .md / .txt files have no HTML <head> to read <link rel="icon"> from, so
# they fall back to auto-discovering /favicon.ico — without this rewrite the
# tab would show no favicon for any .md page.
[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.png"
  status = 200

# Redirect sitemap.xml requests from any path to the version root sitemap
[[redirects]]
  from = "/*/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/*/*/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/*/*/*/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
