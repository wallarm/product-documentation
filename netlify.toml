[build]
publish = "site"
command = """
pip3 install --no-cache-dir -r requirements.txt &&
npm install pngquant &&
cp -R images/ docs/6.x/images/ && INSIDERS=true zensical build -f mkdocs-6.x.yml && rm -rf docs/6.x/images/ &&
cp -R images/ docs/7.x/images/ && INSIDERS=true zensical build -f mkdocs-7.x.yml && rm -rf docs/7.x/images/ &&
cp -R images/ docs/5.0/images/ && INSIDERS=true zensical build -f mkdocs-5.0.yml && rm -rf docs/5.0/images/ &&
cp -R images/ docs/deprecated/images/ && INSIDERS=true zensical build -f mkdocs-deprecated.yml && rm -rf docs/deprecated/images/ &&
cp -R images/ docs/ja/images/ && INSIDERS=true zensical build -f mkdocs-ja-6.x.yml && rm -rf docs/ja/images/ &&
cp -R images/ docs/tr/images/ && INSIDERS=true zensical build -f mkdocs-tr-6.x.yml && rm -rf docs/tr/images/ &&
cp -R images/ docs/pt-BR/images/ && INSIDERS=true zensical build -f mkdocs-pt-BR-4.8.yml && rm -rf docs/pt-BR/images/ &&
cp -R images/ docs/ar/images/ && INSIDERS=true zensical build -f mkdocs-ar-4.10.yml && rm -rf docs/ar/images/
"""
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors *"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"
