<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" style="max-width: 100%; height: auto; font-family: Inter, -apple-system, system-ui, sans-serif;">
  <defs>
    <marker id="arr-navy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1C2752"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#FC7303"/>
    </marker>
  </defs>

  <!-- External model providers (top) -->
  <rect x="270" y="15" width="360" height="74" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="450" y="38" text-anchor="middle" font-size="13" font-weight="600" fill="#1C2752">External model providers, MCP servers, APIs, data</text>
  <text x="450" y="56" text-anchor="middle" font-size="11" fill="#475569">Anthropic · OpenAI · AWS Bedrock · Azure OpenAI · Gemini</text>
  <text x="450" y="72" text-anchor="middle" font-size="11" fill="#475569">Cohere · Mistral · Together · self-hosted · others</text>

  <!-- Outbound arrow from EKS to providers -->
  <line x1="240" y1="180" x2="240" y2="100" stroke="#FC7303" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="252" y="134" font-size="11" fill="#FC7303" font-weight="600">outbound LLM / tool / API calls</text>
  <text x="252" y="150" font-size="10" fill="#FC7303" font-style="italic">(observed in-kernel by HIGGS)</text>

  <!-- Customer EKS Box -->
  <rect x="40" y="180" width="450" height="295" rx="10" fill="#FEFCE8" stroke="#475569" stroke-width="2"/>
  <text x="60" y="205" font-size="14" font-weight="700" fill="#1C2752">Your Amazon EKS cluster</text>
  <text x="60" y="222" font-size="10" fill="#64748B" font-style="italic">(you install via Helm)</text>

  <!-- AI workload pods row -->
  <rect x="60" y="240" width="130" height="58" rx="6" fill="#ffffff" stroke="#94A3B8" stroke-width="1"/>
  <text x="125" y="262" text-anchor="middle" font-size="11" font-weight="600" fill="#1C2752">AI workload</text>
  <text x="125" y="277" text-anchor="middle" font-size="10" fill="#64748B">agent pod</text>
  <text x="125" y="291" text-anchor="middle" font-size="9" fill="#64748B" font-style="italic">higgs.scan=enabled</text>

  <rect x="200" y="240" width="130" height="58" rx="6" fill="#ffffff" stroke="#94A3B8" stroke-width="1"/>
  <text x="265" y="262" text-anchor="middle" font-size="11" font-weight="600" fill="#1C2752">AI workload</text>
  <text x="265" y="277" text-anchor="middle" font-size="10" fill="#64748B">MCP server</text>
  <text x="265" y="291" text-anchor="middle" font-size="9" fill="#64748B" font-style="italic">higgs.scan=enabled</text>

  <rect x="340" y="240" width="130" height="58" rx="6" fill="#ffffff" stroke="#94A3B8" stroke-width="1"/>
  <text x="405" y="262" text-anchor="middle" font-size="11" font-weight="600" fill="#1C2752">AI workload</text>
  <text x="405" y="277" text-anchor="middle" font-size="10" fill="#64748B">app + RAG</text>
  <text x="405" y="291" text-anchor="middle" font-size="9" fill="#64748B" font-style="italic">higgs.scan=enabled</text>

  <!-- eBPF arrows down from pods to scanner -->
  <line x1="125" y1="300" x2="125" y2="365" stroke="#64748B" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="265" y1="300" x2="265" y2="365" stroke="#64748B" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="405" y1="300" x2="405" y2="365" stroke="#64748B" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="140" y="333" font-size="10" fill="#64748B" font-style="italic">eBPF attach</text>

  <!-- HIGGS Scanner DaemonSet -->
  <rect x="60" y="370" width="410" height="85" rx="6" fill="#1C2752" stroke="#1C2752" stroke-width="1"/>
  <text x="265" y="396" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">HIGGS Scanner DaemonSet</text>
  <text x="265" y="414" text-anchor="middle" font-size="10" fill="#CBD5E1">eBPF + non-invasive memory analysis · one pod per worker node</text>
  <text x="265" y="432" text-anchor="middle" font-size="9" fill="#94A3B8" font-style="italic">no SDK · no sidecar · no application code changes</text>
  <text x="265" y="448" text-anchor="middle" font-size="9" fill="#94A3B8" font-style="italic">runtime control: Kill Session (kernel-level)</text>

  <!-- HTTPS arrow from scanner to Wallarm tenant -->
  <line x1="475" y1="412" x2="555" y2="412" stroke="#1C2752" stroke-width="2.5" marker-end="url(#arr-navy)"/>
  <text x="515" y="402" text-anchor="middle" font-size="11" fill="#1C2752" font-weight="700">HTTPS</text>
  <text x="515" y="430" text-anchor="middle" font-size="9" fill="#64748B" font-style="italic">*.hypervisor.wallarm-cloud.com</text>

  <!-- Wallarm tenant box -->
  <rect x="560" y="180" width="320" height="295" rx="10" fill="#0F172B" stroke="#0F172B" stroke-width="2"/>
  <text x="580" y="205" font-size="14" font-weight="700" fill="#ffffff">Wallarm-hosted tenant</text>
  <text x="580" y="222" font-size="10" fill="#94A3B8" font-style="italic">(Wallarm operates)</text>

  <rect x="580" y="240" width="280" height="62" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="720" y="262" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Dashboard + UI</text>
  <text x="720" y="279" text-anchor="middle" font-size="10" fill="#CBD5E1">Briefing · Heatmap · Topology</text>
  <text x="720" y="293" text-anchor="middle" font-size="10" fill="#CBD5E1">Registry · User Tracks · Reports</text>

  <rect x="580" y="312" width="280" height="62" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="720" y="334" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Backend</text>
  <text x="720" y="351" text-anchor="middle" font-size="10" fill="#CBD5E1">findings · sessions stitching</text>
  <text x="720" y="365" text-anchor="middle" font-size="10" fill="#CBD5E1">policy engine · agent tools</text>

  <rect x="580" y="384" width="280" height="62" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="720" y="406" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">ClickHouse</text>
  <text x="720" y="423" text-anchor="middle" font-size="10" fill="#CBD5E1">per-tenant telemetry store</text>
  <text x="720" y="437" text-anchor="middle" font-size="9" fill="#94A3B8" font-style="italic">sessions · PII flows · SBOM · findings</text>
</svg>
